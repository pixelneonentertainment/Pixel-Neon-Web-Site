<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 — Sinyal Kayboldu | Pixel Neon</title>
    <meta name="robots" content="noindex">
    <meta name="theme-color" content="#0a0a0f">
    <link rel="icon" type="image/png" href="pixelneon.png">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root { --cyan:#00ffff; --pink:#ff00ff; --green:#39ff14; --bg:#0a0a0f; }
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            background: var(--bg); color:#fff; min-height:100vh;
            font-family:'Rajdhani',sans-serif;
            display:flex; flex-direction:column; align-items:center; justify-content:center;
            text-align:center; padding:20px; overflow:hidden; position:relative;
        }
        .grid {
            position:fixed; bottom:-50%; left:-50%; width:200%; height:150%;
            background-image:
                linear-gradient(rgba(0,255,255,.12) 1px,transparent 1px),
                linear-gradient(90deg,rgba(0,255,255,.12) 1px,transparent 1px);
            background-size:70px 70px;
            transform:perspective(500px) rotateX(60deg);
            z-index:-1; animation:move 18s linear infinite;
            mask-image:linear-gradient(to top,rgba(0,0,0,.8),transparent 70%);
            -webkit-mask-image:linear-gradient(to top,rgba(0,0,0,.8),transparent 70%);
        }
        @keyframes move { to { transform:perspective(500px) rotateX(60deg) translateY(70px); } }
        h1 {
            font-family:'Orbitron',sans-serif; font-size:clamp(6rem,22vw,14rem); font-weight:900;
            line-height:1; position:relative; color:var(--cyan);
            text-shadow:0 0 20px var(--cyan); animation:glitch 2.5s infinite;
        }
        h1::before, h1::after { content:'404'; position:absolute; top:0; left:0; width:100%; }
        h1::before { color:var(--pink); animation:g1 2.5s infinite; clip-path:inset(0 0 50% 0); }
        h1::after { color:var(--green); animation:g2 2.5s infinite; clip-path:inset(50% 0 0 0); }
        @keyframes glitch { 0%,90%,100%{transform:translate(0)} 92%{transform:translate(-3px,2px)} 94%{transform:translate(3px,-2px)} 96%{transform:translate(-2px,1px)} }
        @keyframes g1 { 0%,90%,100%{transform:translate(0)} 93%{transform:translate(4px,-3px)} }
        @keyframes g2 { 0%,90%,100%{transform:translate(0)} 95%{transform:translate(-4px,3px)} }
        h2 { font-family:'Orbitron',sans-serif; font-size:1.4rem; letter-spacing:4px; text-transform:uppercase; margin:20px 0 10px; color:var(--pink); }
        p { color:#aaa; max-width:480px; margin-bottom:35px; font-size:1.1rem; }
        a.home {
            display:inline-block; padding:16px 45px; font-family:'Orbitron',sans-serif;
            font-size:.9rem; letter-spacing:2px; text-transform:uppercase; text-decoration:none;
            color:var(--cyan); border:2px solid var(--cyan); background:transparent;
            clip-path:polygon(10px 0,100% 0,100% calc(100% - 10px),calc(100% - 10px) 100%,0 100%,0 10px);
            transition:all .3s ease;
        }
        a.home:hover { color:var(--bg); background:var(--cyan); box-shadow:0 0 25px var(--cyan); }
        .code { font-family:'Courier New',monospace; color:var(--green); font-size:.85rem; margin-top:30px; opacity:.6; }
    </style>
</head>
<body>
    <div class="grid"></div>
    <h1>404</h1>
    <h2>Sinyal Kayboldu</h2>
    <p>Aradığın sayfa siber-uzayda kaybolmuş görünüyor. Belki yanlış bir koordinata atladın.</p>
    <a href="./index.html" class="home">&laquo; Ana Üsse Dön</a>
    <div class="code">&gt; ERROR: ROUTE_NOT_FOUND &mdash; reconnecting to mainframe...</div>
</body>
</html>
